name: Trading Bot
on:
  schedule:
    - cron: '0,15,30,45 7-16 * * 1-5'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install yfinance pandas numpy requests
      - run: python bot.py
